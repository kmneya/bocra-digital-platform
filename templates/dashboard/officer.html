{% extends "base.html" %}

{% block content %}
<h2>Officer Dashboard</h2>

<table class="table table-striped mt-3">
    <thead>
        <tr>
            <th>Title</th>
            <th>Status</th>
            <th>Priority</th>
            <th>Action</th>
        </tr>
    </thead>
    <tbody>
        {% for complaint in complaints %}
        <tr>
            <td>{{ complaint.title }}</td>
            <td>{{ complaint.status }}</td>
            <td>{{ complaint.priority }}</td>
            <td>
                <a href="#" class="btn btn-sm btn-primary">Update</a>
            </td>
        </tr>
        {% endfor %}
    </tbody>
</table>
{% endblock %}
