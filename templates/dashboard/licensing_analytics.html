{% extends "base.html" %}

{% block content %}
<div class="sidebar-wrapper">
    {% include "includes/sidebar.html" %}
    <div class="main-content">
        <h2>Licensing Analytics</h2>
        
        <div class="row">
            <div class="col-md-3">
                <div class="card text-center">
                    <div class="card-body">
                        <h3>{{ total_applications }}</h3>
                        <small>Total Applications</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center bg-success text-white">
                    <div class="card-body">
                        <h3>{{ approved }}</h3>
                        <small>Approved</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center bg-warning">
                    <div class="card-body">
                        <h3>{{ pending }}</h3>
                        <small>Pending</small>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card text-center bg-danger text-white">
                    <div class="card-body">
                        <h3>{{ rejected }}</h3>
                        <small>Rejected</small>
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
