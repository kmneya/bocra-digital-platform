{% extends "base.html" %}

{% block content %}
<h2 class="mb-4">Citizen Dashboard</h2>

<div class="row">
    <div class="col-md-4">
        <div class="card p-3 shadow-sm">
            <h5>Total Complaints</h5>
            <p>{{ complaints.count }}</p>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3 shadow-sm">
            <h5>Resolved</h5>
            <p>{{ resolved_count }}</p>
        </div>
    </div>

    <div class="col-md-4">
        <div class="card p-3 shadow-sm">
            <h5>Pending</h5>
            <p>{{ pending_count }}</p>
        </div>
    </div>
</div>

<a href="/complaints/create/" class="btn btn-primary mt-4">Submit Complaint</a>
<a href="/licenses/apply/" class="btn btn-success mt-3">
    Apply for License
</a>
{% endblock %}
