{% extends "base.html" %}

{% block content %}
<h2>Notifications</h2>

<ul class="list-group mt-3">
    {% for n in notifications %}
        <li class="list-group-item">
            {{ n.message }}
            <small class="text-muted">{{ n.created_at }}</small>
        </li>
    {% endfor %}
</ul>
{% endblock %}
