<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>BOCRA Digital Platform</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<!-- 🔝 Navbar -->
<nav class="navbar navbar-expand-lg navbar-dark bg-dark">
    <div class="container-fluid">
        <a class="navbar-brand" href="/">BOCRA Platform</a>

        <div>
        {% if user.is_authenticated %}
            <a href="/dashboard/citizen/" class="btn btn-outline-light me-2">Dashboard</a>

            <a href="/licenses/" class="btn btn-outline-light me-2">Licenses</a>

            <a href="/documents/" class="btn btn-outline-light me-2">Documents</a>

            <a href="/auth/logout/" class="btn btn-danger">Logout</a>
        {% else %}
            <a class="btn btn-outline-light me-2" href="/documents/">Documents</a>

            <a href="/auth/login/" class="btn btn-outline-light">Login</a>

            <a href="/auth/register/" class="btn btn-success">Register</a>
        {% endif %}
    </div>
</nav>

<!-- 📦 Content -->
<div class="container mt-4">
    {% block content %}{% endblock %}
</div>

</body>
</html>
