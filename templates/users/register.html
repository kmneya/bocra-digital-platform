{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="register-wrapper">
    <div class="wrapper">
        <form method="post">
            {% csrf_token %}
            <h2>Create Account</h2>
            
            <div class="input-field">
                <input type="text" name="username" id="username" required>
                <label for="username">Username</label>
            </div>
            
            <div class="input-field">
                <input type="email" name="email" id="email" required>
                <label for="email">Email</label>
            </div>
            
            <div class="input-field">
                <input type="password" name="password1" id="password1" required>
                <label for="password1">Password</label>
            </div>
            
            <div class="input-field">
                <input type="password" name="password2" id="password2" required>
                <label for="password2">Confirm Password</label>
            </div>
            
            <div class="input-field">
                <input type="text" name="first_name" id="first_name">
                <label for="first_name">First Name (Optional)</label>
            </div>
            
            <div class="input-field">
                <input type="text" name="last_name" id="last_name">
                <label for="last_name">Last Name (Optional)</label>
            </div>
            
            <button type="submit">Register</button>
            
            <div class="login-link">
                <p>Already have an account? <a href="/auth/login/">Login</a></p>
            </div>
        </form>
    </div>
</div>

<style>
@import url("https://fonts.googleapis.com/css2?family=Open+Sans:wght@200;300;400;500;600;700&display=swap");

.register-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    width: 100%;
    padding: 40px 10px;
    position: relative;
}

.register-wrapper::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("{% static 'images/logo-bg.jpg' %}"), #000;
    background-position: center;
    background-size: cover;
    z-index: 0;
}

.wrapper {
    width: 450px;
    border-radius: 8px;
    padding: 30px;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(9px);
    -webkit-backdrop-filter: blur(9px);
    background: rgba(255, 255, 255, 0.2);
    position: relative;
    z-index: 1;
    transition: all 0.3s ease;
    animation: glowPulse 2s ease-in-out infinite;
}

@keyframes glowPulse {
    0% {
        box-shadow: 0 0 10px rgba(30, 136, 229, 0.3);
        border-color: rgba(30, 136, 229, 0.3);
    }
    50% {
        box-shadow: 0 0 30px rgba(30, 136, 229, 0.7);
        border-color: rgba(30, 136, 229, 0.7);
    }
    100% {
        box-shadow: 0 0 10px rgba(30, 136, 229, 0.3);
        border-color: rgba(30, 136, 229, 0.3);
    }
}

.wrapper:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 35px rgba(30, 136, 229, 0.6);
}

form {
    display: flex;
    flex-direction: column;
}

h2 {
    font-size: 2rem;
    margin-bottom: 20px;
    color: #000;
    font-weight: 600;
}

.input-field {
    position: relative;
    border-bottom: 2px solid rgba(0, 0, 0, 0.3);
    margin: 20px 0;
}

.input-field label {
    position: absolute;
    top: 50%;
    left: 0;
    transform: translateY(-50%);
    color: #000;
    font-size: 16px;
    pointer-events: none;
    transition: 0.15s ease;
    font-weight: 500;
}

.input-field input {
    width: 100%;
    height: 40px;
    background: transparent;
    border: none;
    outline: none;
    font-size: 16px;
    color: #000;
}

.input-field input:focus ~ label,
.input-field input:valid ~ label {
    font-size: 0.8rem;
    top: 0px;
    transform: translateY(-100%);
    color: #1E88E5;
}

button {
    background: linear-gradient(135deg, #1E88E5, #0d47a1);
    color: white;
    font-weight: 600;
    border: none;
    padding: 12px 20px;
    cursor: pointer;
    border-radius: 5px;
    font-size: 16px;
    transition: 0.3s ease;
    margin-top: 10px;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(30, 136, 229, 0.4);
}

.login-link {
    text-align: center;
    margin-top: 25px;
    color: #000;
}

.login-link a {
    color: #1E88E5;
    text-decoration: none;
    font-weight: 500;
}

.login-link a:hover {
    text-decoration: underline;
    color: #0d47a1;
}

/* Make placeholder text visible */
.input-field input::placeholder {
    color: #666;
    opacity: 0.7;
}

/* Error messages styling */
.errorlist {
    color: #dc3545;
    font-size: 12px;
    text-align: left;
    margin: -10px 0 10px 0;
    padding-left: 0;
    list-style: none;
}
</style>
{% endblock %}
