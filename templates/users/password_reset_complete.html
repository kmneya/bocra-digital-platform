{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="reset-wrapper">
    <div class="wrapper">
        <div class="text-center">
            <div class="mb-4">
                <i class="fas fa-check-circle fa-4x" style="color: #2E7D32;"></i>
            </div>
            <h2>Password Reset Complete</h2>
            <p class="text-muted">Your password has been set. You may go ahead and log in now.</p>
            
            <a href="{% url 'login' %}" class="btn-login">Log In</a>
        </div>
    </div>
</div>

<style>
.reset-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    width: 100%;
    padding: 0 10px;
    position: relative;
}

.reset-wrapper::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("{% static 'images/logo-bg.jpg' %}"), #000;
    background-position: center;
    background-size: cover;
    z-index: 0;
}

.wrapper {
    width: 450px;
    border-radius: 8px;
    padding: 40px 35px;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(9px);
    -webkit-backdrop-filter: blur(9px);
    background: rgba(255, 255, 255, 0.2);
    position: relative;
    z-index: 1;
    transition: all 0.3s ease;
    animation: glowPulse 2s ease-in-out infinite;
}

@keyframes glowPulse {
    0% {
        box-shadow: 0 0 10px rgba(30, 136, 229, 0.3);
        border-color: rgba(30, 136, 229, 0.3);
    }
    50% {
        box-shadow: 0 0 30px rgba(30, 136, 229, 0.7);
        border-color: rgba(30, 136, 229, 0.7);
    }
    100% {
        box-shadow: 0 0 10px rgba(30, 136, 229, 0.3);
        border-color: rgba(30, 136, 229, 0.3);
    }
}

.wrapper:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 35px rgba(30, 136, 229, 0.6);
}

h2 {
    font-size: 1.8rem;
    margin-bottom: 15px;
    color: #000;
    font-weight: 600;
}

.text-muted {
    color: #333 !important;
    font-size: 14px;
    line-height: 1.5;
    margin-bottom: 25px;
}

.btn-login {
    display: inline-block;
    background: linear-gradient(135deg, #1E88E5, #0d47a1);
    color: white;
    font-weight: 600;
    border: none;
    padding: 12px 30px;
    cursor: pointer;
    border-radius: 5px;
    font-size: 16px;
    transition: 0.3s ease;
    text-decoration: none;
}

.btn-login:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(30, 136, 229, 0.4);
    color: white;
    text-decoration: none;
}
</style>
{% endblock %}
