{% extends "base.html" %}
{% load static %}

{% block content %}
<div class="reset-wrapper">
    <div class="wrapper">
        <div class="text-center mb-4">
            <i class="fas fa-lock fa-3x" style="color: #1E88E5;"></i>
            <h2 class="mt-2">Set New Password</h2>
            <p class="text-muted">Please enter your new password twice</p>
        </div>
        
        <form method="POST">
            {% csrf_token %}
            
            <div class="input-field">
                <input type="password" name="new_password1" id="new_password1" required>
                <label for="new_password1">New Password</label>
            </div>
            
            <div class="input-field">
                <input type="password" name="new_password2" id="new_password2" required>
                <label for="new_password2">Confirm Password</label>
            </div>
            
            {% if form.errors %}
                <div class="error-messages">
                    {% for field, errors in form.errors.items %}
                        {% for error in errors %}
                            <small><i class="fas fa-exclamation-circle me-1"></i>{{ error }}</small><br>
                        {% endfor %}
                    {% endfor %}
                </div>
            {% endif %}
            
            <button type="submit">Reset Password</button>
        </form>
    </div>
</div>

<style>
.reset-wrapper {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 100vh;
    width: 100%;
    padding: 0 10px;
    position: relative;
}

.reset-wrapper::before {
    content: "";
    position: absolute;
    width: 100%;
    height: 100%;
    background: url("{% static 'images/logo-bg.jpg' %}"), #000;
    background-position: center;
    background-size: cover;
    z-index: 0;
}

.wrapper {
    width: 450px;
    border-radius: 8px;
    padding: 40px 35px;
    text-align: center;
    border: 1px solid rgba(255, 255, 255, 0.5);
    backdrop-filter: blur(9px);
    -webkit-backdrop-filter: blur(9px);
    background: rgba(255, 255, 255, 0.2);
    position: relative;
    z-index: 1;
    transition: all 0.3s ease;
    animation: glowPulse 2s ease-in-out infinite;
}

@keyframes glowPulse {
    0% {
        box-shadow: 0 0 10px rgba(30, 136, 229, 0.3);
        border-color: rgba(30, 136, 229, 0.3);
    }
    50% {
        box-shadow: 0 0 30px rgba(30, 136, 229, 0.7);
        border-color: rgba(30, 136, 229, 0.7);
    }
    100% {
        box-shadow: 0 0 10px rgba(30, 136, 229, 0.3);
        border-color: rgba(30, 136, 229, 0.3);
    }
}

.wrapper:hover {
    transform: translateY(-5px);
    box-shadow: 0 0 35px rgba(30, 136, 229, 0.6);
}

h2 {
    font-size: 1.8rem;
    margin-bottom: 10px;
    color: #000;
    font-weight: 600;
}

.text-muted {
    color: #333 !important;
    font-size: 14px;
    margin-bottom: 25px;
}

.input-field {
    position: relative;
    border-bottom: 2px solid rgba(0, 0, 0, 0.3);
    margin: 25px 0;
}

.input-field label {
    position: absolute;
    top: 50%;
    left: 0;
    transform: translateY(-50%);
    color: #000;
    font-size: 16px;
    pointer-events: none;
    transition: 0.15s ease;
    font-weight: 500;
}

.input-field input {
    width: 100%;
    height: 40px;
    background: transparent;
    border: none;
    outline: none;
    font-size: 16px;
    color: #000;
}

.input-field input:focus ~ label,
.input-field input:valid ~ label {
    font-size: 0.8rem;
    top: 0px;
    transform: translateY(-100%);
    color: #1E88E5;
}

button {
    background: linear-gradient(135deg, #1E88E5, #0d47a1);
    color: white;
    font-weight: 600;
    border: none;
    padding: 12px 20px;
    cursor: pointer;
    border-radius: 5px;
    font-size: 16px;
    transition: 0.3s ease;
    width: 100%;
    margin-top: 15px;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 5px 15px rgba(30, 136, 229, 0.4);
}

.error-messages {
    background: rgba(220, 53, 69, 0.1);
    border-left: 3px solid #dc3545;
    padding: 10px;
    border-radius: 5px;
    margin: 10px 0;
    text-align: left;
    color: #dc3545;
    font-size: 12px;
}
</style>
{% endblock %}
